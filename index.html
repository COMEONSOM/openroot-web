<!doctype html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <!-- ======================================================
  Viewport
  ====================================================== -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- ======================================================
  Primary SEO
  ====================================================== -->
  <title>Openroot Systems | AI Tools, Education & Software Solutions</title>

  <meta
    name="description"
    content="Openroot Systems empowers students and small businesses with AI tools, productivity software, financial education and innovative digital solutions."
  />

  <meta name="robots" content="index, follow" />

  <!-- ❌ REMOVED STATIC CANONICAL (IMPORTANT FIX) -->

  <!-- Sitemap -->
  <link rel="sitemap" type="application/xml" href="https://openroot.in/sitemap.xml" />

  <!-- ======================================================
  Favicon
  ====================================================== -->
  <link rel="icon" type="image/x-icon" href="https://openroot.in/favicon.ico?v=2">

  <link rel="icon" type="image/png" sizes="32x32" href="https://openroot.in/favicon.ico?v=2">

  <link rel="icon" type="image/png" sizes="16x16" href="https://openroot.in/favicon.ico?v=2">

  <link rel="apple-touch-icon" sizes="180x180" href="https://openroot.in/logo.png?v=2">

  <meta name="apple-mobile-web-app-title" content="Openroot Systems">
  <meta name="application-name" content="Openroot Systems">

  <!-- ======================================================
  Performance Optimization
  ====================================================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- ======================================================
  Fonts
  ====================================================== -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <!-- ======================================================
  Theme Color
  ====================================================== -->
  <meta name="theme-color" content="#000000" />

  <!-- ======================================================
  Font Awesome
  ====================================================== -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- ======================================================
  OpenGraph (Social Sharing)
  ====================================================== -->
  <meta property="og:title" content="Openroot Systems – AI Tools & Software Solutions" />

  <meta
    property="og:description"
    content="Explore Openroot tools including NIOR AI, Resource Hub, Travel Expense Manager and digital utilities for students and businesses."
  />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://openroot.in/" />
  <meta property="og:site_name" content="Openroot Systems" />

  <meta
    property="og:image"
    content="https://openroot.in/assets/company-icon.png"
  />

  <!-- ======================================================
  Twitter Card
  ====================================================== -->
  <meta name="twitter:card" content="summary_large_image" />

  <meta
    name="twitter:title"
    content="Openroot Systems – AI Tools & Software"
  />

  <meta
    name="twitter:description"
    content="Openroot builds AI tools, productivity software and digital solutions for students and MSMEs."
  />

  <meta
    name="twitter:image"
    content="https://openroot.in/assets/company-icon.png"
  />

  <!-- ======================================================
  Organization Schema
  ====================================================== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Openroot Systems",
    "url": "https://openroot.in",
    "logo": "https://openroot.in/logo.png",
    "description": "Openroot Systems develops AI tools, productivity software and educational platforms for students and businesses.",
    "sameAs": [
      "https://www.facebook.com/OpenrootSystems",
      "https://x.com/comeonsom_",
      "https://www.linkedin.com/in/somnath-banerjee-Om980"
    ]
  }
  </script>

  <!-- ======================================================
  Website Schema
  ====================================================== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Openroot Systems",
    "url": "https://openroot.in",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://openroot.in/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

</body>

</html>
