<!doctype html>
<html lang="en">

<head>
  
  <!-- THEME — must run before any render to prevent flash -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("ot-theme-mode") || localStorage.getItem("ot-theme");
        if (saved === "light" || saved === "dark") {
          document.documentElement.setAttribute("data-theme", saved);
        } else {
          document.documentElement.removeAttribute("data-theme");
        }
      } catch (e) {}
    })();
  </script>

  <meta charset="UTF-8" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- Color scheme — prevents browser UI flash -->
  <meta name="color-scheme" content="light dark" />

  <!-- Primary SEO -->
  <title>Openroot Systems | AI Tools, Education & Software Solutions</title>

  <meta
    name="description"
    content="Openroot Systems empowers students and small businesses with AI tools, productivity software, financial education and innovative digital solutions."
  />

  <meta name="robots" content="index, follow" />

  <!-- Sitemap -->
  <link rel="sitemap" type="application/xml" href="https://openroot.in/sitemap.xml" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="https://openroot.in/favicon.ico?v=2" />
  <link rel="icon" type="image/png" sizes="32x32" href="https://openroot.in/favicon-32x32.png?v=2" />
  <link rel="icon" type="image/png" sizes="16x16" href="https://openroot.in/favicon-16x16.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://openroot.in/logo.png?v=2" />

  <meta name="apple-mobile-web-app-title" content="Openroot Systems" />
  <meta name="application-name" content="Openroot Systems" />

  <!-- Theme color — matches --ot-bg in dark mode -->
  <meta name="theme-color" content="#0a0a0a" />

  <!-- FIX 1: Preconnect — existing fonts origins (kept) + added Firebase & Google API origins
       from report: "Preconnect candidates" saving 300–330 ms each -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://openroot-hypersite.firebaseapp.com" crossorigin />
  <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://apis.google.com" crossorigin />

  <!-- FIX 2: Google Fonts — non-render-blocking load via media trick.
       Report flagged this at 780 ms blocking. Using media="print" + onload swap
       defers it out of the critical path entirely. The <noscript> fallback
       covers users with JS disabled. -->
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
  </noscript>

  <!-- OpenGraph -->
  <meta property="og:title" content="Openroot Systems – AI Tools & Software Solutions" />
  <meta
    property="og:description"
    content="Explore Openroot tools including NIOR AI, Resource Hub, Travel Expense Manager and digital utilities for students and businesses."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://openroot.in/" />
  <meta property="og:site_name" content="Openroot Systems" />
  <meta property="og:image" content="https://openroot.in/assets/company-icon.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Openroot Systems – AI Tools & Software" />
  <meta name="twitter:description" content="Openroot builds AI tools, productivity software and digital solutions for students and MSMEs." />
  <meta name="twitter:image" content="https://openroot.in/assets/company-icon.png" />

  <!-- Organization Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Openroot Systems",
    "url": "https://openroot.in",
    "logo": "https://openroot.in/logo.png",
    "description": "Openroot Systems develops AI tools, productivity software and educational platforms for students and businesses.",
    "sameAs": [
      "https://www.facebook.com/OpenrootSystems",
      "https://x.com/comeonsom_",
      "https://www.linkedin.com/in/somnath-banerjee-Om980"
    ]
  }
  </script>

  <!-- Website Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Openroot Systems",
    "url": "https://openroot.in",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://openroot.in/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- FIX 3: Add <main> landmark via CSS reset trick is not possible here;
       handled in App.tsx instead. Scroll stabiliser kept. -->
  <style>
    html { overflow-y: scroll; }
    /* FIX 4: Reserve space for header logo to prevent CLS before image loads */
    .header-logo-img { width: 197px; height: 45px; }
  </style>

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

</body>

</html>
